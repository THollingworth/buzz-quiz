<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chaos Culture — SPMG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="chaos.css">
</head>
<body>

<!-- HEADER -->
<header class="cc-header">
  <a href="/hub.html" class="back-btn">← Hub</a>
  <div class="cc-logo"><span class="lo-c">Chaos</span> <span class="lo-k">Culture</span></div>
  <div class="header-user" id="headerUser">
    <div class="avatar-fallback" id="headerAvatar">?</div>
    <span id="headerPseudo">...</span>
  </div>
</header>

<!-- SCREENS -->

<!-- LOBBY LIST -->
<div id="screenLobbyList" class="screen active">
  <div class="cc-main">
    <h1 class="screen-title">Rejoindre une partie</h1>
    <div class="action-row">
      <button class="btn btn-primary" id="btnCreate">🎲 Créer une table</button>
    </div>
    <div class="join-row">
      <input id="joinCode" class="code-input" placeholder="Code XXXX" maxlength="4">
      <button class="btn btn-secondary" id="btnJoin">Rejoindre</button>
    </div>
    <div id="roomList" class="room-list"></div>
  </div>
</div>

<!-- CREATE MODAL -->
<div id="modalCreate" class="modal hidden">
  <div class="modal-box">
    <h2 class="modal-title">Nouvelle partie</h2>
    <label class="field-label">Nombre de questions</label>
    <div class="choice-row" id="qCountChoices">
      <button class="choice-btn active" data-val="20">20</button>
      <button class="choice-btn" data-val="30">30</button>
      <button class="choice-btn" data-val="40">40</button>
      <button class="choice-btn" data-val="50">50</button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="btnCreateCancel">Annuler</button>
      <button class="btn btn-primary" id="btnCreateConfirm">Créer</button>
    </div>
  </div>
</div>

<!-- LOBBY -->
<div id="screenLobby" class="screen hidden">
  <div class="cc-main">
    <div class="room-code-box">
      <span class="room-code-label">Code de la salle</span>
      <span class="room-code" id="lobbyCode">----</span>
    </div>
    <div id="countdownBanner" class="countdown-banner hidden">
      🚀 Démarrage dans <strong id="countdownSec">5</strong>s
    </div>
    <div class="lobby-grid" id="lobbyPlayers"></div>
    <div class="lobby-footer">
      <button class="btn btn-secondary" id="btnReady">✅ Prêt</button>
      <button class="btn btn-primary hidden" id="btnForceStart">▶ Lancer</button>
    </div>
    <div class="q-info" id="lobbyQInfo"></div>
  </div>
</div>

<!-- PLAYING -->
<div id="screenPlaying" class="screen hidden">
  <div class="cc-main">
    <div class="q-header">
      <div class="q-progress">
        <div class="q-progress-bar" id="qProgressBar"></div>
      </div>
      <div class="q-meta">
        <span id="qNum" class="q-num">Q1</span>
        <span id="qType" class="q-type-badge"></span>
        <span id="qTimer" class="q-timer">15</span>
      </div>
    </div>
    <div class="q-card" id="qCard">
      <div class="q-text" id="qText"></div>
      <div id="qChoices" class="q-choices hidden"></div>
      <div id="qInput" class="q-input-area hidden">
        <input id="answerInput" class="answer-input" placeholder="Ta réponse…" maxlength="200" autocomplete="off">
        <button class="btn btn-primary" id="btnAnswer">Envoyer</button>
      </div>
      <div id="qVF" class="q-vf hidden">
        <button class="vf-btn vf-vrai" data-val="vrai">✅ VRAI</button>
        <button class="vf-btn vf-faux" data-val="faux">❌ FAUX</button>
      </div>
      <div id="qAnswered" class="q-answered hidden">
        <div class="answered-icon">✓</div>
        <div class="answered-label">Réponse envoyée !</div>
        <div id="answeredCount" class="answered-count"></div>
      </div>
    </div>
  </div>
</div>

<!-- CORRECTION -->
<div id="screenCorrection" class="screen hidden">
  <div class="cc-main correction-main">
    <div class="corr-header">
      <span class="corr-label">Phase de correction</span>
      <span id="corrQNum" class="corr-qnum"></span>
      <div class="corr-timer-bar-wrap"><div class="corr-timer-bar" id="corrTimerBar"></div></div>
    </div>
    <div class="corr-question" id="corrQuestion"></div>
    <div id="corrAnswersList" class="corr-answers-list"></div>
    <div id="corrResults" class="corr-results hidden"></div>
    <div id="corrAdminBar" class="corr-admin-bar hidden">
      <button class="btn btn-ghost" id="btnNextCorr">Suivant →</button>
    </div>
  </div>
</div>

<!-- RESULTS -->
<div id="screenResults" class="screen hidden">
  <div class="cc-main">
    <h1 class="screen-title">🏆 Résultats</h1>
    <div id="finalScores" class="final-scores"></div>
    <div id="shameSection" class="shame-section hidden">
      <h2 class="shame-title">🍅 Classement de la honte</h2>
      <div id="shameScores"></div>
    </div>
    <div id="resultsAdminBar" class="results-admin-bar hidden">
      <button class="btn btn-secondary" id="btnPlayAgain">🔄 Rejouer</button>
    </div>
  </div>
</div>

<!-- ERROR TOAST -->
<div id="toast" class="toast hidden"></div>

<script src="chaos.js"></script>
</body>
</html>
