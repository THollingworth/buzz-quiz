services:
  spmg:
    build: .
    image: spmg:latest
    container_name: spmg
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - COOKIE_SECRET=9fabbc75b741f52d8b81e5b6e52b2965767b80327f16f399650519e12e463c1a
      # - COLLECT_MS=5000
    volumes:
      - spmg-data:/app/data
      - spmg-videos:/app/public/videos
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  spmg-data:
  spmg-videos:
