services:
  blindzik:
    build: .
    image: blindzik:latest
    container_name: blindzik
    restart: unless-stopped
    ports:
      # hôte:conteneur — change le port hôte (gauche) si 3000 est déjà pris
      - "3000:3000"
    environment:
      - PORT=3000
      - DATA_DIR=/app/data
      # Durée (ms) de la fenêtre de réponse après un buzz (défaut 5000)
      # - COLLECT_MS=5000
    volumes:
      # Tes vidéos vivent ici et persistent même si tu reconstruis l'image.
      # Tu peux les déposer via Portainer (Volumes > blindzik-videos > Browse)
      # ou remplacer par un bind mount, ex : /opt/blindzik/videos:/app/public/videos
      - blindzik-videos:/app/public/videos
      # Comptes + historique des parties (fichier JSON) — à conserver absolument.
      - blindzik-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  blindzik-videos:
  blindzik-data:
